<svg width="700" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color"
          values="#ff6ec7;#a78bfa;#60a5fa;#34d399;#fbbf24;#f87171;#ff6ec7"
          dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%">
        <animate attributeName="stop-color"
          values="#a78bfa;#60a5fa;#34d399;#fbbf24;#f87171;#ff6ec7;#a78bfa"
          dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%">
        <animate attributeName="stop-color"
          values="#60a5fa;#34d399;#fbbf24;#f87171;#ff6ec7;#a78bfa;#60a5fa"
          dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color"
          values="#34d399;#fbbf24;#f87171;#ff6ec7;#a78bfa;#60a5fa;#34d399"
          dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%">
        <animate attributeName="stop-color"
          values="#6366f1;#a78bfa;#60a5fa;#34d399;#6366f1"
          dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%">
        <animate attributeName="stop-color"
          values="#60a5fa;#34d399;#6366f1;#a78bfa;#60a5fa"
          dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

  </defs>

  <rect width="700" height="120" rx="14" fill="#0a0a0f"/>

  <line x1="0" y1="0" x2="700" y2="0" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="0" y1="119" x2="700" y2="119" stroke="#1e1e2e" stroke-width="1"/>

  <text x="36" y="62"
    font-family="'Courier New', Courier, monospace"
    font-size="38"
    font-weight="bold"
    fill="url(#grad)">Hey I am Mellal Rida
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
  </text>

  <text x="36" y="90"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    letter-spacing="3"
    fill="#6366f1">&#9658; INDUSTRIAL AUTOMATION &amp; FULL-STACK DEVELOPER</text>

  <rect x="36" y="106" width="628" height="2" rx="1" fill="url(#line)"/>

  <rect x="36" y="44" width="3" height="28" rx="1" fill="#a78bfa">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

</svg>
