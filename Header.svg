<svg width="700" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color"
          values="#ff0000;#ff7700;#ffff00;#00cc00;#0088ff;#6600cc;#ff0000"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="25%">
        <animate attributeName="stop-color"
          values="#ff7700;#ffff00;#00cc00;#0088ff;#6600cc;#ff0000;#ff7700"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color"
          values="#ffff00;#00cc00;#0088ff;#6600cc;#ff0000;#ff7700;#ffff00"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%">
        <animate attributeName="stop-color"
          values="#00cc00;#0088ff;#6600cc;#ff0000;#ff7700;#ffff00;#00cc00"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color"
          values="#0088ff;#6600cc;#ff0000;#ff7700;#ffff00;#00cc00;#0088ff"
          dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Shadow layer for depth -->
  <text x="2" y="67" font-family="'Courier New', monospace"
    font-size="42" font-weight="bold"
    fill="#00000033">Hey I am Mellal Rida</text>

  <!-- Glow layer -->
  <text x="0" y="65" font-family="'Courier New', monospace"
    font-size="42" font-weight="bold"
    fill="url(#rainbow)" filter="url(#glow)"
    opacity="0.5">Hey I am Mellal Rida</text>

  <!-- Main text -->
  <text x="0" y="65" font-family="'Courier New', monospace"
    font-size="42" font-weight="bold"
    fill="url(#rainbow)">Hey I am Mellal Rida
    <animate attributeName="opacity"
      values="0.85;1;0.85"
      dur="3s" repeatCount="indefinite"/>
  </text>

</svg>
